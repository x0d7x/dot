"$schema" = 'https://starship.rs/config-schema.json'
# A minimal left prompt
format = """
$os\
$directory\
$line_break\
$character\
"""
right_format = """
$cmd_duration\
${custom.jj}\
"""

add_newline = false
scan_timeout = 200
command_timeout = 500
palette = "gruvbox_dark"

[os]
disabled = false

[line_break]
disabled = true

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="ïگˆ "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="ïٹ– "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="ï…± "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="ï‍، "
else
    GIT_REMOTE_SYMBOL="ï‡’ "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = "$output"
require_repo = true
ignore_timeout = true

[git_branch] 
symbol = "(base)ïگک "
style = "fg:lavender "
format =  "  [$symbol$branch]($style)(base)"
disabled = true

# [git_status] 
# MINIMAL git status 
# format = " [($all_status$ahead_behind )]($style)"
# ahead    = "â‡،${count} "
# behind   = "â‡£${count} "
# diverged = "â‡•â‡،${ahead_count}â‡£${behind_count} "

[git_status]
format = "[$staged$modified$renamed$conflicted$ahead_behind]($style)"
# options available for format
staged     = "[+${count} ](green)"
modified   = "[!${count} ](yellow)"
renamed    = "[آ»${count} ](blue)"
deleted    = "[-${count} ](red)"
untracked  = "[?${count} ](sapphire)"
stashed    = "[â‰،${count} ](lavender)"
conflicted = "[âœ–${count} ](red bold)"

ahead      = "[â‡،${count} ](teal)"
behind     = "[â‡£${count} ](peach)"
diverged   = "[â‡•â‡،${ahead_count}â‡£${behind_count} ](mauve)"
disabled = true

[custom.jj]
when = "jj-starship detect"
shell = ["jj-starship"]
format = "$output "
ignore_timeout = true


[os.symbols]
Macos = "ï…¹ "
Linux = "ï…¼ "
Windows = "ï…؛ "

[character]
success_symbol = '[\$](bold yellow)'
error_symbol = '[\$](bold red)'

[cmd_duration]
format = 'َ°“… [$duration]($style) '

[lua]
format = 'lua [َ°¢± $version](bold blue) '

[package]
disabled =false

[nodejs]
symbol = "îœک"
format = "[ $symbol( $version) ]($style)"
detect_files = ["package.json"]

[php]
format = "[ $symbol($version) ]($style)"

[golang]
symbol = "îک§"
format = "[ $symbol( $version) ]($style)"
detect_files = ["go.mod"]

[directory]
style = "cyan bold"
truncation_length = 4
truncate_to_repo = false
truncation_symbol = "ًں‘ˆ/"

[directory.substitutions]
"Documents" = "َ°ˆ™ "
"Downloads" = "ï€™ "
"Music" = "î°› "
"Pictures" = "ï€¾ "
"Developer" = "َ°²‹ "
"Others" = "ï‡گ "

